name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Space-separated package tags to publish (e.g. @joakimbugge/typeorm-seeder@0.9.0)'
        required: true
      dist-tag:
        description: 'npm dist-tag (use "backfill" for older versions, "latest" for newest)'
        required: true
        default: latest

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r run build

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm changeset publish
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-backfill:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish packages from tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tag in ${{ inputs.tags }}; do
            if echo "$tag" | grep -q '^@'; then
              pkg=$(echo "$tag" | sed 's/@joakimbugge\///' | sed 's/@[0-9].*//')
            else
              pkg=$(echo "$tag" | sed 's/-v[0-9].*//')
            fi
            path="packages/$pkg"
            git checkout "$tag" -- "$path"
            pnpm --filter "./$path" run build
            cd "$path" && npm publish --access public --tag ${{ inputs.dist-tag }} && cd -
          done

  docs-build:
    needs: release
    if: needs.release.result == 'success' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run docs:build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
