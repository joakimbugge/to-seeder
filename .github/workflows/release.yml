name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Space-separated git tags to publish (e.g. typeorm-seeder-v0.3.0 nest-typeorm-seeder-v0.2.0)'
        required: true
      dist-tag:
        description: 'npm dist-tag (use "backfill" for older versions, "latest" for the newest)'
        required: true
        default: latest

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.result == 'success' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish released packages
        if: github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for path in $(echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]'); do
            pnpm --filter "./$path" run build
            cd "$path" && npm publish --access public && cd -
          done

      - name: Publish packages from tags
        if: github.event_name == 'workflow_dispatch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tag in ${{ inputs.tags }}; do
            pkg=$(echo "$tag" | sed 's/-v[0-9].*//')
            path="packages/$pkg"
            git checkout "$tag" -- "$path"
            pnpm --filter "./$path" run build
            cd "$path" && npm publish --access public --tag ${{ inputs.dist-tag }} && cd -
          done
